<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>나의 일정 관리</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>나의 일정 관리</h1>
      <div class="lock-panel">
        <label for="password-input">편집 비밀번호</label>
        <div class="lock-controls">
          <input id="password-input" type="password" placeholder="비밀번호 입력" />
          <button id="unlock-btn">잠금 해제</button>
          <button id="lock-btn" class="secondary">잠그기</button>
        </div>
        <p id="lock-status" class="lock-status lock-status--locked">현재 상태: 잠김</p>
      </div>
    </header>

    <main class="app-main">
      <section class="todo-form-section">
        <h2>새 할 일 추가</h2>
        <form id="todo-form">
          <div class="form-row">
            <label for="title-input">할 일</label>
            <input id="title-input" type="text" placeholder="무엇을 할까요?" required />
          </div>
          <div class="form-row">
            <label for="department-select">요청 부서</label>
            <select id="department-select" required>
              <option value="">선택</option>
              <option value="개인">개인</option>
              <option value="전략기획단">전략기획단</option>
              <option value="정책센터">정책센터</option>
              <option value="대외협력실">대외협력실</option>
              <option value="기본사업">기본사업</option>
              <option value="대한설비공학회">대한설비공학회</option>
            </select>
          </div>
          <div class="form-row deadline-row">
            <label for="deadline-input">마감일</label>
            <div class="deadline-picker-wrap">
              <input id="deadline-input" type="text" placeholder="YYYY-MM-DD 또는 클릭" required autocomplete="off" />
              <button type="button" id="deadline-calendar-btn" class="calendar-trigger-btn" title="달력에서 선택">📅</button>
              <div id="datepicker-popup" class="datepicker-popup" aria-hidden="true"></div>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" id="add-btn">추가</button>
            <button type="button" id="reset-form-btn" class="secondary">입력 초기화</button>
          </div>
        </form>
      </section>

      <section class="toolbar-section">
        <div class="toolbar-left">
          <button type="button" id="export-json-btn" class="secondary">JSON 내보내기</button>
          <button type="button" id="reset-storage-btn" class="secondary">브라우저 데이터 초기화</button>
        </div>
        <div class="toolbar-right">
          <label for="filter-select">보기</label>
          <select id="filter-select">
            <option value="all">전체</option>
            <option value="today">오늘</option>
            <option value="pending">미완료만</option>
            <option value="done">완료만</option>
          </select>
        </div>
      </section>

      <section class="department-section">
        <h2>요청 부서별 할 일</h2>
        <div id="todo-list-empty" class="empty-message">
          아직 등록된 할 일이 없습니다. 위에서 새로운 할 일을 추가해 보세요.
        </div>
        <div id="department-list" class="department-list"></div>
      </section>

      <section class="priority-titles-section">
        <h2>우선순위별 제목</h2>
        <div id="priority-titles-list" class="priority-titles-list"></div>
      </section>

      <section class="calendar-section" id="calendar-section">
        <div class="calendar-header">
          <button type="button" id="calendar-prev-btn" class="secondary">◀</button>
          <div class="calendar-month" id="calendar-month-label">달력</div>
          <button type="button" id="calendar-next-btn" class="secondary">▶</button>
        </div>
        <div class="calendar-weekdays">
          <div>일</div>
          <div>월</div>
          <div>화</div>
          <div>수</div>
          <div>목</div>
          <div>금</div>
          <div>토</div>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
      </section>
    </main>

    <footer class="app-footer">
      <p>데이터는 브라우저와 GitHub 리포지토리에 저장됩니다.</p>
      <p class="hint">
        편집 전에는 항상 <code>git pull</code>, 편집 후에는 <code>git commit</code>과 <code>git push</code>를 해 주세요.
      </p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
